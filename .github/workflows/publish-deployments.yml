name: Publish Deployments

on:
  push:
    branches: [main]
    paths:
      - 'deployments/geniusdiamond*.json'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate deployments.json
        run: node scripts/aggregate.mjs

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: deployments/deployments.json
          generate_release_notes: true
